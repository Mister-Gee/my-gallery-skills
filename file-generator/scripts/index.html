<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Generator Skill</title>
</head>
<body>
  <script>
    window['ai_edge_gallery_get_result'] = async (data) => {
      try {
        const jsonData = JSON.parse(data);
        const type     = (jsonData.type     || 'txt').toLowerCase().trim();
        const content  =  jsonData.content  || '';
        const filename =  jsonData.filename || ('file.' + type);

        if (!content) {
          return JSON.stringify({ error: 'No file content provided.' });
        }

        // base64-encode content so it survives URL round-trip without length/encoding issues
        const b64 = btoa(unescape(encodeURIComponent(content)));

        return JSON.stringify({
          result: `Generated ${filename} (${content.length} characters). Tap to view and copy.`,
          webview: {
            url: `viewer.html?type=${encodeURIComponent(type)}&filename=${encodeURIComponent(filename)}&data=${encodeURIComponent(b64)}`,
            aspectRatio: 1.25
          }
        });
      } catch (e) {
        console.error(e);
        return JSON.stringify({ error: `File Generator error: ${e.message}` });
      }
    };
  </script>
</body>
</html>
