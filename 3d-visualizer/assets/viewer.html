<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; width: 100vw !important; height: 100vh !important; }

    #title-overlay {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
      color: #fff; font-size: 0.95rem; font-weight: 600;
      pointer-events: none; text-align: center;
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      letter-spacing: 0.3px;
    }

    #scene-badge {
      position: fixed; bottom: 30px; left: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      font-size: 0.6rem; padding: 3px 8px; border-radius: 10px;
      pointer-events: none; text-transform: uppercase; letter-spacing: 1.5px;
    }

    #hint {
      position: fixed; bottom: 10px; right: 12px;
      color: rgba(255,255,255,0.25); font-size: 0.6rem;
      pointer-events: none; letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="title-overlay"></div>
  <div id="scene-badge"></div>
  <div id="hint">Drag &middot; Scroll &middot; Pinch</div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/loaders/GLTFLoader.js"></script>
  <script>

    const params = new URLSearchParams(window.location.search);
    const sceneType = (params.get('scene') || 'geometry').toLowerCase();
    const shape     = (params.get('shape') || 'cube').toLowerCase();
    const title     = decodeURIComponent(params.get('title') || '3D Visualizer');
    const desc      = decodeURIComponent(params.get('description') || '');
    const modelUrl  = decodeURIComponent(params.get('modelUrl') || '');

    document.getElementById('title-overlay').textContent = title + (desc ? '  –  ' + desc : '');
    document.getElementById('scene-badge').textContent   = sceneType;

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Scene + Camera
    const scene  = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 7);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.06;
    controls.minDistance    = 1.5;
    controls.maxDistance    = 60;

    // Lighting
    scene.add(new THREE.AmbientLight(0x223355, 2.0));
    const sun = new THREE.DirectionalLight(0xffffff, 2.5);
    sun.position.set(6, 12, 8);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    scene.add(sun);
    const fill = new THREE.PointLight(0x4466ff, 2.5, 40);
    fill.position.set(-6, 4, -6);
    scene.add(fill);

    // Starfield
    const starPositions = new Float32Array(3000 * 3);
    for (let i = 0; i < starPositions.length; i++) {
      starPositions[i] = (Math.random() - 0.5) * 500;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    scene.add(new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({ color: 0xffffff, size: 0.25, sizeAttenuation: true })
    ));

    // State
    const rotatables = [];
    const orbiters   = [];

    // Builders
    function buildGeometry() {
      const geoMap = {
        cube:         new THREE.BoxGeometry(2, 2, 2),
        sphere:       new THREE.SphereGeometry(1.3, 64, 64),
        torus:        new THREE.TorusGeometry(1.2, 0.42, 48, 128),
        cone:         new THREE.ConeGeometry(1.2, 2.6, 64),
        cylinder:     new THREE.CylinderGeometry(1, 1, 2.5, 64),
        octahedron:   new THREE.OctahedronGeometry(1.6),
        dodecahedron: new THREE.DodecahedronGeometry(1.4),
        icosahedron:  new THREE.IcosahedronGeometry(1.5),
      };
      const geo = geoMap[shape] || geoMap['cube'];

      const mat = new THREE.MeshStandardMaterial({
        color: 0x3377ff, metalness: 0.65, roughness: 0.25,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      scene.add(mesh);
      rotatables.push(mesh);

      const wireMat = new THREE.MeshBasicMaterial({
        color: 0x88bbff, wireframe: true, transparent: true, opacity: 0.07,
      });
      scene.add(new THREE.Mesh(geo, wireMat));

      const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(30, 30),
        new THREE.MeshStandardMaterial({ color: 0x0d0d2a, roughness: 0.9, metalness: 0.1 })
      );
      plane.rotation.x = -Math.PI / 2;
      plane.position.y  = -2.8;
      plane.receiveShadow = true;
      scene.add(plane);

      const glow = new THREE.PointLight(0x3377ff, 1.5, 12);
      glow.position.set(0, -1.5, 0);
      scene.add(glow);
    }

    function buildSolarSystem() {
      camera.position.set(0, 9, 18);

      const sunMesh = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 48, 48),
        new THREE.MeshBasicMaterial({ color: 0xffe066 })
      );
      scene.add(sunMesh);

      [2.0, 2.5].forEach((r, i) => {
        const gm = new THREE.Mesh(
          new THREE.SphereGeometry(r, 32, 32),
          new THREE.MeshBasicMaterial({
            color: i === 0 ? 0xff9900 : 0xff5500,
            transparent: true,
            opacity: 0.07 - i * 0.02,
            side: THREE.BackSide
          })
        );
        scene.add(gm);
      });
      scene.add(new THREE.PointLight(0xffe066, 4, 60));

      const planetData = [
        { name: 'Mercury', r: 0.18, dist: 2.8,  speed: 4.7, color: 0x999999 },
        { name: 'Venus',   r: 0.30, dist: 4.0,  speed: 3.5, color: 0xddbb88 },
        { name: 'Earth',   r: 0.33, dist: 5.5,  speed: 2.9, color: 0x3366dd },
        { name: 'Mars',    r: 0.22, dist: 7.0,  speed: 2.4, color: 0xcc4422 },
        { name: 'Jupiter', r: 0.75, dist: 9.5,  speed: 1.3, color: 0xddaa66 },
        { name: 'Saturn',  r: 0.60, dist: 12.5, speed: 0.9, color: 0xeedd99 },
      ];

      planetData.forEach(p => {
        const pts = [];
        for (let i = 0; i <= 128; i++) {
          const a = (i / 128) * Math.PI * 2;
          pts.push(Math.cos(a) * p.dist, 0, Math.sin(a) * p.dist);
        }
        const og = new THREE.BufferGeometry();
        og.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
        scene.add(new THREE.Line(
          og,
          new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.08 })
        ));

        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(p.r, 32, 32),
          new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.65, metalness: 0.1 })
        );
        mesh.castShadow = true;
        scene.add(mesh);

        if (p.name === 'Saturn') {
          const ringGeo = new THREE.RingGeometry(p.r * 1.4, p.r * 2.2, 64);
          const ringMat = new THREE.MeshBasicMaterial({
            color: 0xddcc88,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.5
          });
          const ring = new THREE.Mesh(ringGeo, ringMat);
          ring.rotation.x = Math.PI / 2.5;
          mesh.add(ring);
        }

        orbiters.push({ mesh, dist: p.dist, speed: p.speed, angle: Math.random() * Math.PI * 2 });
      });
    }

    function buildMolecule() {
      camera.position.set(0, 2, 7);

      const molGroup = new THREE.Group();
      scene.add(molGroup);
      rotatables.push(molGroup);

      const oMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.65, 48, 48),
        new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.35, metalness: 0.2 })
      );
      molGroup.add(oMesh);

      const bondAngle = 104.5 * (Math.PI / 180);
      const bondLen   = 1.7;
      const hPositions = [
        new THREE.Vector3( Math.sin(bondAngle / 2) * bondLen, -Math.cos(bondAngle / 2) * bondLen * 0.85, 0),
        new THREE.Vector3(-Math.sin(bondAngle / 2) * bondLen, -Math.cos(bondAngle / 2) * bondLen * 0.85, 0),
      ];

      hPositions.forEach(pos => {
        const hMesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.38, 32, 32),
          new THREE.MeshStandardMaterial({ color: 0xddeeff, roughness: 0.3, metalness: 0.05 })
        );
        hMesh.position.copy(pos);
        molGroup.add(hMesh);

        const mid = pos.clone().multiplyScalar(0.5);
        const bondGeo = new THREE.CylinderGeometry(0.09, 0.09, pos.length(), 16);
        const bond = new THREE.Mesh(
          bondGeo,
          new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, transparent: true, opacity: 0.75 })
        );
        bond.position.copy(mid);
        bond.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), pos.clone().normalize());
        molGroup.add(bond);
      });

      const label = document.createElement('div');
      label.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:0.7rem;pointer-events:none;letter-spacing:1px;';
      label.textContent = 'H₂O – Water Molecule';
      document.body.appendChild(label);
    }

    function buildFractal() {
      camera.position.set(0, 4, 11);

      function mengerPositions(level, size, cx, cy, cz, out) {
        if (level === 0) { out.push({ x: cx, y: cy, z: cz, s: size }); return; }
        const ns = size / 3;
        for (let x = -1; x <= 1; x++) {
          for (let y = -1; y <= 1; y++) {
            for (let z = -1; z <= 1; z++) {
              const zeros = (x === 0 ? 1 : 0) + (y === 0 ? 1 : 0) + (z === 0 ? 1 : 0);
              if (zeros >= 2) continue;
              mengerPositions(level - 1, ns, cx + x * ns, cy + y * ns, cz + z * ns, out);
            }
          }
        }
      }

      const positions = [];
      mengerPositions(2, 3, 0, 0, 0, positions);

      const geo = new THREE.BoxGeometry(1, 1, 1);
      const mat = new THREE.MeshStandardMaterial({ color: 0x44aaff, metalness: 0.8, roughness: 0.15 });
      const iMesh = new THREE.InstancedMesh(geo, mat, positions.length);
      iMesh.castShadow = true;

      const dummy = new THREE.Object3D();
      positions.forEach((p, i) => {
        dummy.position.set(p.x, p.y, p.z);
        dummy.scale.setScalar(p.s);
        dummy.updateMatrix();
        iMesh.setMatrixAt(i, dummy.matrix);
      });
      iMesh.instanceMatrix.needsUpdate = true;
      scene.add(iMesh);
      rotatables.push(iMesh);

      const glow = new THREE.PointLight(0x44aaff, 2, 20);
      glow.position.set(0, 0, 0);
      scene.add(glow);
    }

    function buildHuman() {
      camera.position.set(0, 0.4, 5.5);
      controls.target.set(0, 0.3, 0);
      controls.update();

      const group = new THREE.Group();
      scene.add(group);
      rotatables.push(group);

      const skin  = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.8,  metalness: 0.0 });
      const shirt = new THREE.MeshStandardMaterial({ color: 0x2244cc, roughness: 0.85, metalness: 0.0 });
      const pants = new THREE.MeshStandardMaterial({ color: 0x1a2a44, roughness: 0.9,  metalness: 0.05 });
      const shoes = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6,  metalness: 0.15 });
      const hair  = new THREE.MeshStandardMaterial({ color: 0x220d00, roughness: 1.0,  metalness: 0.0 });

      function part(geo, mat, x, y, z, rx, ry, rz) {
        const m = new THREE.Mesh(geo, mat);
        m.position.set(x, y, z);
        if (rx !== undefined) m.rotation.set(rx, ry || 0, rz || 0);
        m.castShadow = true;
        group.add(m);
        return m;
      }

      // Head
      part(new THREE.SphereGeometry(0.28, 32, 32), skin, 0, 1.62, 0);
      // Hair cap (upper hemisphere)
      part(new THREE.SphereGeometry(0.285, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.52), hair, 0, 1.67, -0.02);
      // Neck
      part(new THREE.CylinderGeometry(0.09, 0.10, 0.20, 16), skin, 0, 1.38, 0);
      // Torso
      part(new THREE.BoxGeometry(0.58, 0.76, 0.26), shirt, 0, 0.87, 0);
      // Hips
      part(new THREE.BoxGeometry(0.54, 0.36, 0.26), pants, 0, 0.28, 0);

      // Arms
      for (var _si = 0; _si < 2; _si++) {
        var s = _si === 0 ? -1 : 1;
        var ax = s * 0.45;
        part(new THREE.SphereGeometry(0.095, 16, 16), shirt, ax, 1.19, 0);
        part(new THREE.CylinderGeometry(0.082, 0.082, 0.44, 16), shirt, ax, 0.84, 0);
        part(new THREE.SphereGeometry(0.082, 16, 16), skin, ax, 0.60, 0);
        part(new THREE.CylinderGeometry(0.070, 0.066, 0.40, 16), skin, ax, 0.35, 0);
        part(new THREE.SphereGeometry(0.088, 16, 16), skin, ax, 0.13, 0);
      }

      // Legs
      for (var _li = 0; _li < 2; _li++) {
        var ls = _li === 0 ? -1 : 1;
        var lx = ls * 0.18;
        part(new THREE.CylinderGeometry(0.11, 0.10, 0.56, 16), pants, lx, -0.22, 0);
        part(new THREE.SphereGeometry(0.095, 16, 16), pants, lx, -0.53, 0);
        part(new THREE.CylinderGeometry(0.082, 0.078, 0.52, 16), pants, lx, -0.82, 0);
        part(new THREE.BoxGeometry(0.15, 0.09, 0.26), shoes, lx, -1.13, 0.04);
      }

      // Floor
      var floor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20),
        new THREE.MeshStandardMaterial({ color: 0x0d0d2a, roughness: 0.95 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = -1.19;
      floor.receiveShadow = true;
      scene.add(floor);

      var rim = new THREE.DirectionalLight(0x7799ff, 1.5);
      rim.position.set(-5, 5, -6);
      scene.add(rim);
    }

    function buildRobot() {
      camera.position.set(0, 0.4, 6);
      controls.target.set(0, 0.3, 0);
      controls.update();

      const group = new THREE.Group();
      scene.add(group);
      rotatables.push(group);

      const metal  = new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.25, metalness: 0.85 });
      const dark   = new THREE.MeshStandardMaterial({ color: 0x223344, roughness: 0.3,  metalness: 0.9 });
      const cyan   = new THREE.MeshStandardMaterial({ color: 0x00ffcc, roughness: 0.1,  metalness: 0.0, emissive: new THREE.Color(0x00ffcc), emissiveIntensity: 0.9 });
      const redEye = new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.05, metalness: 0.0, emissive: new THREE.Color(0xff3300), emissiveIntensity: 1.2 });

      function part(geo, mat, x, y, z, rx, ry, rz) {
        const m = new THREE.Mesh(geo, mat);
        m.position.set(x, y, z);
        if (rx !== undefined) m.rotation.set(rx, ry || 0, rz || 0);
        m.castShadow = true;
        group.add(m);
        return m;
      }

      // Head
      part(new THREE.BoxGeometry(0.50, 0.44, 0.44), metal, 0, 1.62, 0);
      // Eyes
      part(new THREE.CylinderGeometry(0.062, 0.062, 0.06, 16), redEye, -0.13, 1.66, 0.23, Math.PI / 2, 0, 0);
      part(new THREE.CylinderGeometry(0.062, 0.062, 0.06, 16), redEye,  0.13, 1.66, 0.23, Math.PI / 2, 0, 0);
      // Antenna
      part(new THREE.CylinderGeometry(0.018, 0.018, 0.28, 8), metal, 0, 2.02, 0);
      part(new THREE.SphereGeometry(0.044, 12, 12), cyan, 0, 2.18, 0);
      // Neck
      part(new THREE.CylinderGeometry(0.11, 0.14, 0.18, 16), dark, 0, 1.39, 0);
      // Torso
      part(new THREE.BoxGeometry(0.70, 0.74, 0.36), metal, 0, 0.87, 0);
      // Chest reactor
      part(new THREE.CylinderGeometry(0.10, 0.10, 0.05, 24), dark, 0, 0.90, 0.19);
      part(new THREE.CylinderGeometry(0.058, 0.058, 0.07, 24), cyan, 0, 0.90, 0.22);
      // Hips
      part(new THREE.BoxGeometry(0.60, 0.32, 0.34), dark, 0, 0.28, 0);

      // Arms
      for (var _ri = 0; _ri < 2; _ri++) {
        var rs = _ri === 0 ? -1 : 1;
        var ax = rs * 0.54;
        part(new THREE.SphereGeometry(0.115, 16, 16), metal, ax, 1.19, 0);
        part(new THREE.CylinderGeometry(0.094, 0.088, 0.44, 12), metal, ax, 0.84, 0);
        part(new THREE.SphereGeometry(0.088, 16, 16), dark, ax, 0.60, 0);
        part(new THREE.CylinderGeometry(0.080, 0.074, 0.40, 12), metal, ax, 0.35, 0);
        part(new THREE.TorusGeometry(0.082, 0.016, 8, 24), cyan, ax, 0.14, 0, Math.PI / 2, 0, 0);
        part(new THREE.BoxGeometry(0.17, 0.11, 0.13), dark, ax, 0.03, 0);
      }

      // Legs
      for (var _rli = 0; _rli < 2; _rli++) {
        var rls = _rli === 0 ? -1 : 1;
        var lx = rls * 0.20;
        part(new THREE.CylinderGeometry(0.12, 0.10, 0.54, 12), metal, lx, -0.22, 0);
        part(new THREE.SphereGeometry(0.10, 16, 16), dark, lx, -0.52, 0);
        part(new THREE.CylinderGeometry(0.088, 0.082, 0.50, 12), metal, lx, -0.80, 0);
        part(new THREE.TorusGeometry(0.086, 0.014, 8, 24), cyan, lx, -1.06, 0, Math.PI / 2, 0, 0);
        part(new THREE.BoxGeometry(0.22, 0.11, 0.32), dark, lx, -1.18, 0.05);
      }

      // Floor
      var rfloor = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 20),
        new THREE.MeshStandardMaterial({ color: 0x0d0d2a, roughness: 0.95 })
      );
      rfloor.rotation.x = -Math.PI / 2;
      rfloor.position.y = -1.25;
      rfloor.receiveShadow = true;
      scene.add(rfloor);

      var reactorLight = new THREE.PointLight(0x00ffcc, 3, 10);
      reactorLight.position.set(0, 0.90, 0.5);
      scene.add(reactorLight);
    }

    function buildModel(url) {
      if (!url || typeof THREE.GLTFLoader === 'undefined') { buildHuman(); return; }

      var loadLabel = document.createElement('div');
      loadLabel.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.65);font-size:0.85rem;pointer-events:none;letter-spacing:0.5px;';
      loadLabel.textContent = 'Loading model…';
      document.body.appendChild(loadLabel);

      camera.position.set(0, 1, 6);
      controls.target.set(0, 0, 0);
      controls.update();

      var loader = new THREE.GLTFLoader();
      loader.load(
        url,
        function(gltf) {
          loadLabel.remove();
          var model = gltf.scene;

          // Auto-fit: center and scale to ~3.5 units tall
          var box    = new THREE.Box3().setFromObject(model);
          var center = box.getCenter(new THREE.Vector3());
          var size   = box.getSize(new THREE.Vector3());
          var maxDim = Math.max(size.x, size.y, size.z);
          var scale  = 3.5 / maxDim;

          model.scale.setScalar(scale);
          model.position.sub(center.multiplyScalar(scale));

          model.traverse(function(child) {
            if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
          });

          scene.add(model);
          rotatables.push(model);

          // Floor
          var mfloor = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x0d0d2a, roughness: 0.95 })
          );
          mfloor.rotation.x = -Math.PI / 2;
          mfloor.position.y = -size.y * scale * 0.5;
          mfloor.receiveShadow = true;
          scene.add(mfloor);
        },
        undefined,
        function() {
          loadLabel.textContent = 'Model failed to load — showing default.';
          setTimeout(function() { loadLabel.remove(); buildHuman(); }, 1800);
        }
      );
    }

    switch (sceneType) {
      case 'solar-system': buildSolarSystem();    break;
      case 'molecule':     buildMolecule();       break;
      case 'fractal':      buildFractal();        break;
      case 'human':        buildHuman();          break;
      case 'robot':        buildRobot();          break;
      case 'model':        buildModel(modelUrl);  break;
      default:             buildGeometry();       break;
    }

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      rotatables.forEach(m => {
        m.rotation.x = t * 0.35;
        m.rotation.y = t * 0.55;
      });

      orbiters.forEach(p => {
        p.angle += p.speed * 0.004;
        p.mesh.position.set(Math.cos(p.angle) * p.dist, 0, Math.sin(p.angle) * p.dist);
        p.mesh.rotation.y += 0.015;
      });

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
