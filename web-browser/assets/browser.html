<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Browser</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d0d1a; }
    #layout { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

    #toolbar { display:flex; align-items:center; gap:6px; background:#1a1a2e; padding:7px 8px; border-bottom:1px solid rgba(255,255,255,0.07); height:52px; flex-shrink:0; }
    .nav-btn { background: rgba(255,255,255,0.07); border:0; color:#c0c0d0; width:38px; height:38px; border-radius:9px; font-size:1.05rem; cursor:pointer; }
    .nav-btn:disabled { opacity:0.28; cursor:default; }
    #addr { flex:1; height:38px; border-radius:20px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); color:#dde; padding:0 12px; outline:none; }
    #go { background:#4a6cf7; border:0; color:#fff; width:38px; height:38px; border-radius:9px; cursor:pointer; }
    #frame { flex:1; border:0; width:100%; height:100%; background:#fff; }
    #status { height:20px; background:#151525; border-top:1px solid rgba(255,255,255,0.04); color:rgba(255,255,255,0.28); font-size:0.62rem; display:flex; align-items:center; padding:0 10px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  </style>
</head>
<body>
  <div id="layout">
    <div id="toolbar">
      <button class="nav-btn" id="back" disabled>&larr;</button>
      <button class="nav-btn" id="fwd" disabled>&rarr;</button>
      <button class="nav-btn" id="reload">&#8635;</button>
      <button class="nav-btn" id="home">&#8962;</button>
      <input id="addr" placeholder="Enter URL or search..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" />
      <button id="go">&#10148;</button>
    </div>

    <iframe id="frame"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads"
      allow="fullscreen; geolocation"
      referrerpolicy="no-referrer-when-downgrade"></iframe>

    <div id="status">Ready</div>
  </div>

  <script>
    const frame = document.getElementById('frame');
    const addr  = document.getElementById('addr');
    const back  = document.getElementById('back');
    const fwd   = document.getElementById('fwd');
    const reload= document.getElementById('reload');
    const home  = document.getElementById('home');
    const go    = document.getElementById('go');
    const status= document.getElementById('status');

    const navHistory = [];
    let idx = -1;

    function normalize(input) {
      input = (input || '').trim();
      if (!input) return 'https://www.google.com';
      if (input.includes(' ') || (!input.includes('.') && !input.startsWith('http'))) {
        return 'https://www.google.com/search?q=' + encodeURIComponent(input);
      }
      if (!input.startsWith('http://') && !input.startsWith('https://')) return 'https://' + input;
      return input;
    }

    function updateBtns() {
      back.disabled = idx <= 0;
      fwd.disabled  = idx >= navHistory.length - 1;
    }

    function load(url) {
      addr.value = url;
      frame.src = url;
      try { status.textContent = "Loading " + new URL(url).hostname + "..."; } catch { status.textContent = "Loading..."; }
    }

    function nav(url) {
      url = normalize(url);
      navHistory.splice(idx + 1);
      navHistory.push(url);
      idx = navHistory.length - 1;
      updateBtns();
      load(url);
    }

    frame.addEventListener('load', () => {
      let current = navHistory[idx] || '';
      try {
        const href = frame.contentWindow.location.href;
        if (href && href !== 'about:blank') { current = href; addr.value = href; navHistory[idx] = href; }
      } catch (_) {}
      try { status.textContent = new URL(current).hostname; } catch { status.textContent = "Page loaded"; }
    });

    back.onclick   = () => { if (idx > 0) { idx--; updateBtns(); load(navHistory[idx]); } };
    fwd.onclick    = () => { if (idx < navHistory.length - 1) { idx++; updateBtns(); load(navHistory[idx]); } };
    reload.onclick = () => { if (navHistory[idx]) load(navHistory[idx]); };
    home.onclick   = () => nav('https://www.google.com');
    go.onclick     = () => nav(addr.value);
    addr.addEventListener('keydown', e => { if (e.key === 'Enter') nav(addr.value); });
    addr.addEventListener('focus', () => addr.select());

    const params = new URLSearchParams(location.search);
    nav(params.get('url') || 'https://www.google.com');
  </script>
</body>
</html>
