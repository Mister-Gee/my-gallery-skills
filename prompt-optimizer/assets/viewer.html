<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Optimizer</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; background: #09090f; color: #dde;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; padding: 0; }

    /* ── Header ── */
    #header {
      background: #0e0e1c; border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    #header-icon { font-size: 1.1rem; flex-shrink: 0; }
    #header-title { font-size: 0.84rem; font-weight: 700; color: #eef; flex: 1; }
    #uc-badge {
      font-size: 0.58rem; font-weight: 700; padding: 2px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0;
      background: rgba(74,108,247,0.28); color: #8ab4f8; border: 1px solid rgba(74,108,247,0.3);
    }

    /* ── Score banner ── */
    #score-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; background: rgba(255,255,255,0.025);
      border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
    }
    .score-block { display: flex; flex-direction: column; align-items: center; gap: 1px; flex-shrink: 0; }
    .score-num {
      font-size: 1.3rem; font-weight: 800; line-height: 1;
      color: rgba(255,255,255,0.3);
    }
    .score-num.good { color: #4ade80; }
    .score-num.mid  { color: #facc15; }
    .score-num.bad  { color: #f87171; }
    .score-lbl { font-size: 0.56rem; color: rgba(255,255,255,0.28); text-transform: uppercase; letter-spacing: 0.3px; }
    .score-arrow { font-size: 0.9rem; color: rgba(255,255,255,0.22); flex-shrink: 0; }
    .score-delta {
      font-size: 0.72rem; font-weight: 700; flex-shrink: 0;
      padding: 2px 8px; border-radius: 6px;
      background: rgba(74,222,128,0.14); color: #4ade80;
      border: 1px solid rgba(74,222,128,0.25);
    }
    .score-delta.flat { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.1); }
    #score-bar .spacer { flex: 1; }

    /* ── Improvement tags ── */
    #tags-row {
      display: flex; flex-wrap: wrap; gap: 5px;
      padding: 8px 14px; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
    }
    .impr-tag {
      font-size: 0.62rem; padding: 2px 8px; border-radius: 12px;
      background: rgba(74,108,247,0.14); color: #8ec4ff;
      border: 1px solid rgba(74,108,247,0.22);
    }

    /* ── Scrollable content ── */
    #scroll-area { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }

    /* ── Prompt blocks ── */
    .prompt-block { border-radius: 10px; overflow: hidden; }
    .pb-header {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 11px; font-size: 0.66rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .pb-header-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pb-label { flex: 1; }
    .pb-charcount { font-size: 0.58rem; font-weight: 400; opacity: 0.5; }

    /* Original */
    .block-orig { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); }
    .block-orig .pb-header { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4); }
    .block-orig .pb-header-dot { background: rgba(255,255,255,0.25); }
    .pb-text-orig {
      padding: 10px 12px; font-size: 0.80rem; line-height: 1.7;
      color: rgba(180,200,240,0.45); white-space: pre-wrap; word-break: break-word;
    }

    /* Optimized */
    .block-opt { background: rgba(74,108,247,0.06); border: 1px solid rgba(74,108,247,0.28); }
    .block-opt .pb-header { background: rgba(74,108,247,0.14); color: #8ab4f8; }
    .block-opt .pb-header-dot { background: #4a6cf7; box-shadow: 0 0 6px rgba(74,108,247,0.8); }
    .pb-text-opt {
      padding: 10px 12px; font-size: 0.80rem; line-height: 1.7;
      color: #ddeeff; white-space: pre-wrap; word-break: break-word;
    }

    /* ── Copy button ── */
    #copy-btn {
      width: 100%; padding: 11px; border-radius: 10px;
      background: #4a6cf7; border: none; color: #fff;
      font-size: 0.82rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s; flex-shrink: 0;
    }
    #copy-btn:active { background: #3a5ce7; }
    #copy-btn.copied { background: #059669; }

    /* ── Use-case label map ── */
  </style>
</head>
<body>
  <div id="app">
    <div id="header">
      <span id="header-icon">✦</span>
      <span id="header-title">Prompt Optimizer</span>
      <span id="uc-badge">—</span>
    </div>

    <div id="score-bar">
      <div class="score-block">
        <span class="score-num" id="sb-num">—</span>
        <span class="score-lbl">Before</span>
      </div>
      <span class="score-arrow">→</span>
      <div class="score-block">
        <span class="score-num" id="sa-num">—</span>
        <span class="score-lbl">After</span>
      </div>
      <div class="spacer"></div>
      <span class="score-delta" id="delta-badge">—</span>
    </div>

    <div id="tags-row"></div>

    <div id="scroll-area">
      <div class="prompt-block block-orig" id="block-orig">
        <div class="pb-header">
          <span class="pb-header-dot"></span>
          <span class="pb-label">Original</span>
          <span class="pb-charcount" id="orig-chars"></span>
        </div>
        <div class="pb-text-orig" id="orig-text"></div>
      </div>

      <div class="prompt-block block-opt" id="block-opt">
        <div class="pb-header">
          <span class="pb-header-dot"></span>
          <span class="pb-label">Optimized</span>
          <span class="pb-charcount" id="opt-chars"></span>
        </div>
        <div class="pb-text-opt" id="opt-text"></div>
      </div>

      <button id="copy-btn">Copy optimized prompt</button>
    </div>
  </div>

  <script>
    var p = new URLSearchParams(location.search);

    function decB64(key) {
      try {
        var raw = p.get(key) || '';
        return decodeURIComponent(escape(atob(decodeURIComponent(raw))));
      } catch(e) { return ''; }
    }
    function decB64Json(key) {
      try { return JSON.parse(decB64(key)); } catch(e) { return []; }
    }

    var original     = decB64('orig');
    var optimized    = decB64('opt');
    var improvements = decB64Json('impr');
    var scoreBefore  = parseInt(p.get('sb'), 10) || 0;
    var scoreAfter   = parseInt(p.get('sa'), 10) || 0;
    var useCase      = decodeURIComponent(p.get('uc') || 'other');

    var UC_LABELS = {
      coding: 'Coding', writing: 'Writing', analysis: 'Analysis',
      creative: 'Creative', research: 'Research', chat: 'Chat',
      data: 'Data', other: 'General'
    };

    // ── Use-case badge ───────────────────────────────────────────
    var ucEl = document.getElementById('uc-badge');
    ucEl.textContent = UC_LABELS[useCase] || 'General';

    // ── Score display ────────────────────────────────────────────
    function scoreClass(n) {
      if (n >= 8) return 'good';
      if (n >= 5) return 'mid';
      return 'bad';
    }

    var sbEl = document.getElementById('sb-num');
    var saEl = document.getElementById('sa-num');
    sbEl.textContent = scoreBefore + '/10';
    saEl.textContent = scoreAfter  + '/10';
    sbEl.classList.add(scoreClass(scoreBefore));
    saEl.classList.add(scoreClass(scoreAfter));

    var delta  = scoreAfter - scoreBefore;
    var dEl    = document.getElementById('delta-badge');
    if (delta > 0) {
      dEl.textContent = '+' + delta + ' pts';
    } else if (delta === 0) {
      dEl.textContent = 'No change';
      dEl.classList.add('flat');
    } else {
      dEl.textContent = delta + ' pts';
      dEl.classList.add('flat');
    }

    // ── Improvement tags ─────────────────────────────────────────
    var tagsRow = document.getElementById('tags-row');
    if (improvements.length) {
      improvements.forEach(function(tag) {
        var span = document.createElement('span');
        span.className   = 'impr-tag';
        span.textContent = tag;
        tagsRow.appendChild(span);
      });
    } else {
      tagsRow.style.display = 'none';
    }

    // ── Prompts ──────────────────────────────────────────────────
    document.getElementById('orig-text').textContent = original  || '(none)';
    document.getElementById('opt-text').textContent  = optimized || '(none)';
    document.getElementById('orig-chars').textContent = original.length  + ' chars';
    document.getElementById('opt-chars').textContent  = optimized.length + ' chars';

    // ── Copy button ──────────────────────────────────────────────
    var copyBtn = document.getElementById('copy-btn');
    copyBtn.onclick = function() {
      if (!optimized) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(optimized).then(function() {
          copyBtn.textContent = 'Copied!';
          copyBtn.classList.add('copied');
          setTimeout(function() {
            copyBtn.textContent = 'Copy optimized prompt';
            copyBtn.classList.remove('copied');
          }, 2000);
        }).catch(fallbackCopy);
      } else {
        fallbackCopy();
      }
    };

    function fallbackCopy() {
      var ta = document.createElement('textarea');
      ta.value = optimized;
      ta.style.cssText = 'position:fixed;top:-999px;left:-999px;opacity:0';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(function() {
          copyBtn.textContent = 'Copy optimized prompt';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch(e) {
        copyBtn.textContent = 'Copy failed';
      }
      document.body.removeChild(ta);
    }
  </script>
</body>
</html>
