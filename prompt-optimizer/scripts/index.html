<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Optimizer Skill</title>
</head>
<body>
  <script>
    window['ai_edge_gallery_get_result'] = async (data) => {
      try {
        const d            = JSON.parse(data);
        const original     = (d.original     || '').trim();
        const optimized    = (d.optimized    || '').trim();
        const improvements = Array.isArray(d.improvements) ? d.improvements : [];
        const scoreBefore  = parseInt(d.score_before, 10) || 0;
        const scoreAfter   = parseInt(d.score_after,  10) || 0;
        const useCase      = (d.use_case || 'other').trim();

        if (!original || !optimized) {
          return JSON.stringify({ error: 'Prompt Optimizer: original and optimized prompts are required.' });
        }

        // Encode all text fields as base64 for safe URL transport
        const enc = (s) => encodeURIComponent(btoa(unescape(encodeURIComponent(s))));
        const encArr = (arr) => encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(arr)))));

        const viewerUrl = `viewer.html?orig=${enc(original)}&opt=${enc(optimized)}&impr=${encArr(improvements)}&sb=${scoreBefore}&sa=${scoreAfter}&uc=${encodeURIComponent(useCase)}`;

        const delta = scoreAfter - scoreBefore;
        const deltaStr = delta > 0 ? `+${delta}` : String(delta);
        const impCount = improvements.length;

        return JSON.stringify({
          result: `Prompt optimized. Score: ${scoreBefore}/10 → ${scoreAfter}/10 (${deltaStr}). ${impCount} technique${impCount !== 1 ? 's' : ''} applied. Tap to view and copy.`,
          webview: {
            url: viewerUrl,
            aspectRatio: 1.4
          }
        });
      } catch (e) {
        console.error(e);
        return JSON.stringify({ error: `Prompt Optimizer error: ${e.message}` });
      }
    };
  </script>
</body>
</html>
