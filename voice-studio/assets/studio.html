<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Voice</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; background: #09090f; color: #dde;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    #app { display: flex; flex-direction: column; height: 100vh; padding: 12px 14px 10px; gap: 9px; }

    /* AI status row */
    #status-row {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
      padding: 7px 10px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 10px;
    }
    #ai-dot {
      width: 9px; height: 9px; border-radius: 50%; background: #4a6cf7;
      box-shadow: 0 0 6px rgba(74,108,247,0.7); flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #ai-dot.speaking {
      background: #00e5a0; box-shadow: 0 0 10px rgba(0,229,160,0.8);
      animation: pulse 1s ease-in-out infinite;
    }
    #ai-dot.paused { background: #f7a94a; box-shadow: 0 0 6px rgba(247,169,74,0.7); animation: none; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.5); } }
    #ai-label { font-size: 0.72rem; font-weight: 600; color: #aabbdd; flex: 1; }
    #ai-status { font-size: 0.65rem; color: rgba(255,255,255,0.32); }

    /* Waveform */
    #waveform { width: 100%; flex-shrink: 0; border-radius: 8px; }

    /* Word-highlighted text */
    #text-display {
      flex: 1; overflow-y: auto; font-size: 0.86rem; line-height: 1.85;
      color: rgba(180,200,240,0.38); padding: 4px 2px;
      -webkit-overflow-scrolling: touch;
    }
    .word { display: inline; }
    .word.active {
      color: #ffffff;
      background: rgba(74,108,247,0.22);
      border-radius: 3px; padding: 0 2px; margin: 0 -2px;
      text-shadow: 0 0 14px rgba(74,108,247,0.9);
    }
    .word.done { color: rgba(180,200,240,0.72); }

    /* Controls */
    #controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .ctl-btn {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.10);
      color: #ccd; width: 42px; height: 42px; border-radius: 50%;
      font-size: 1.05rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .ctl-btn:disabled { opacity: 0.25; cursor: default; }
    .ctl-btn:not(:disabled):active { background: rgba(255,255,255,0.18); }
    #btn-pp {
      width: 52px; height: 52px; font-size: 1.25rem;
      background: #4a6cf7; border-color: #4a6cf7; color: #fff;
    }
    #btn-pp.speaking { background: rgba(74,108,247,0.40); }
    .speed-row { display: flex; align-items: center; gap: 6px; flex: 1; }
    .sp-lbl { font-size: 0.60rem; color: rgba(255,255,255,0.30); flex-shrink: 0; }
    .sp-val { font-size: 0.60rem; color: rgba(255,255,255,0.45); width: 28px; flex-shrink: 0; }
    input[type=range] {
      flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.14); outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: #4a6cf7; cursor: pointer;
    }
    #footer-note { font-size: 0.56rem; color: rgba(255,255,255,0.15); text-align: center; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="app">
    <div id="status-row">
      <div id="ai-dot"></div>
      <span id="ai-label">AI Agent Voice</span>
      <span id="ai-status">Ready</span>
    </div>

    <canvas id="waveform" height="50"></canvas>

    <div id="text-display"></div>

    <div id="controls">
      <button class="ctl-btn" id="btn-replay" title="Replay" disabled>&#8635;</button>
      <button class="ctl-btn" id="btn-pp"     title="Play / Pause">&#9654;</button>
      <button class="ctl-btn" id="btn-stop"   title="Stop"   disabled>&#9632;</button>
      <div class="speed-row">
        <span class="sp-lbl">Speed</span>
        <input type="range" id="rate-slider" min="0.5" max="2.0" step="0.1" value="1.0" />
        <span class="sp-val" id="rate-val">1.0&times;</span>
      </div>
    </div>

    <div id="footer-note">On-device TTS &middot; works offline &middot; word highlighting via Web Speech API</div>
  </div>

  <script>
    var synth    = window.speechSynthesis;
    var params   = new URLSearchParams(location.search);
    var fullText = decodeURIComponent(params.get('text')  || '');
    var reqVoice = decodeURIComponent(params.get('voice') || '');
    var reqPitch = parseFloat(params.get('pitch') || '1.0');

    var aiDot    = document.getElementById('ai-dot');
    var aiStatus = document.getElementById('ai-status');
    var textDisp = document.getElementById('text-display');
    var btnPP    = document.getElementById('btn-pp');
    var btnStop  = document.getElementById('btn-stop');
    var btnRep   = document.getElementById('btn-replay');
    var rateSl   = document.getElementById('rate-slider');
    var rateValEl= document.getElementById('rate-val');
    var canvas   = document.getElementById('waveform');
    var ctx      = canvas.getContext('2d');

    var voices        = [];
    var speaking      = false;
    var paused        = false;
    var wordSpans     = [];
    var wordOffsets   = [];
    var currentWord   = -1;
    var autoSpeakDone = false;

    // â”€â”€ Init rate slider â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    var pRate = params.get('rate');
    if (pRate) rateSl.value = pRate;
    rateValEl.textContent = parseFloat(rateSl.value).toFixed(1) + '\u00d7';
    rateSl.oninput = function() {
      rateValEl.textContent = parseFloat(rateSl.value).toFixed(1) + '\u00d7';
    };

    // â”€â”€ Build word display â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function buildDisplay(text) {
      textDisp.innerHTML = '';
      wordSpans   = [];
      wordOffsets = [];
      if (!text) return;
      var charPos = 0;
      text.split(/(\s+)/).forEach(function(token) {
        if (/^\s+$/.test(token)) {
          textDisp.appendChild(document.createTextNode(token));
          charPos += token.length;
        } else if (token) {
          var span = document.createElement('span');
          span.className = 'word';
          span.textContent = token;
          textDisp.appendChild(span);
          wordOffsets.push(charPos);
          wordSpans.push(span);
          charPos += token.length;
        }
      });
    }

    function activateWord(charIdx) {
      var best = 0;
      for (var i = 0; i < wordOffsets.length; i++) {
        if (wordOffsets[i] <= charIdx) best = i; else break;
      }
      if (best === currentWord) return;
      if (currentWord >= 0 && wordSpans[currentWord]) {
        wordSpans[currentWord].classList.remove('active');
        wordSpans[currentWord].classList.add('done');
      }
      currentWord = best;
      if (wordSpans[best]) {
        wordSpans[best].classList.add('active');
        wordSpans[best].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    function finishAllWords() {
      wordSpans.forEach(function(s) { s.classList.remove('active'); s.classList.add('done'); });
      currentWord = -1;
    }

    function resetWords() {
      wordSpans.forEach(function(s) { s.classList.remove('active', 'done'); });
      currentWord = -1;
    }

    // â”€â”€ Voices â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function loadVoices() {
      var v = synth.getVoices();
      if (!v.length) return;
      voices = v;
      tryAutoSpeak();
    }
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
    loadVoices();
    setTimeout(function() { loadVoices(); if (!autoSpeakDone) tryAutoSpeak(); }, 600);

    function tryAutoSpeak() {
      if (autoSpeakDone || !fullText) return;
      autoSpeakDone = true;
      buildDisplay(fullText);
      doSpeak(fullText);
    }

    // â”€â”€ Speech â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function doSpeak(text) {
      synth.cancel();
      resetWords();
      var utt   = new SpeechSynthesisUtterance(text);
      utt.rate  = parseFloat(rateSl.value);
      utt.pitch = reqPitch;
      if (reqVoice) {
        var rl = reqVoice.toLowerCase();
        var mi = voices.findIndex(function(v) { return v.name.toLowerCase().includes(rl); });
        if (mi >= 0) utt.voice = voices[mi];
      }
      utt.onstart = function() {
        speaking = true; paused = false;
        setUI('speaking'); aiStatus.textContent = 'Speaking\u2026';
      };
      utt.onboundary = function(e) {
        if (e.name === 'word') activateWord(e.charIndex);
      };
      utt.onend = function() {
        speaking = false; paused = false;
        finishAllWords(); setUI('done'); aiStatus.textContent = 'Done';
      };
      utt.onerror = function(e) {
        speaking = false; paused = false;
        setUI('idle'); aiStatus.textContent = 'Error: ' + (e.error || 'TTS failed');
      };
      synth.speak(utt);
    }

    function setUI(state) {
      var isSpeaking = state === 'speaking';
      var isPaused   = state === 'paused';
      var isIdle     = state === 'idle' || state === 'done';
      aiDot.classList.toggle('speaking', isSpeaking);
      aiDot.classList.toggle('paused',   isPaused);
      btnPP.innerHTML = isSpeaking ? '&#9646;&#9646;' : '&#9654;';
      btnPP.classList.toggle('speaking', isSpeaking);
      btnStop.disabled = isIdle;
      btnRep.disabled  = isSpeaking || isPaused;
    }

    btnPP.onclick = function() {
      if (!speaking && !paused) {
        buildDisplay(fullText); doSpeak(fullText);
      } else if (speaking) {
        synth.pause(); speaking = false; paused = true;
        setUI('paused'); aiStatus.textContent = 'Paused';
      } else {
        synth.resume(); paused = false; speaking = true;
        setUI('speaking'); aiStatus.textContent = 'Speaking\u2026';
      }
    };
    btnStop.onclick = function() {
      synth.cancel(); speaking = false; paused = false;
      setUI('idle'); aiStatus.textContent = 'Stopped';
    };
    btnRep.onclick = function() { buildDisplay(fullText); doSpeak(fullText); };

    // â”€â”€ Waveform â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    var BAR_N = 46;
    var bars  = [];
    for (var _i = 0; _i < BAR_N; _i++) bars.push({ h: 2, phase: Math.random() * Math.PI * 2 });

    function resizeCvs() {
      var dpr = window.devicePixelRatio || 1;
      canvas.width  = canvas.offsetWidth * dpr;
      canvas.height = 50 * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resizeCvs();
    window.addEventListener('resize', resizeCvs);

    function drawWave(ts) {
      requestAnimationFrame(drawWave);
      var W = canvas.offsetWidth, H = 50;
      ctx.clearRect(0, 0, W, H);
      var bw = W / BAR_N, t = (ts || 0) * 0.001;
      var active = speaking && !paused;
      for (var i = 0; i < BAR_N; i++) {
        var b = bars[i];
        var freq   = 3.2 + (i % 7) * 0.55;
        var target = active
          ? (Math.sin(t * freq + b.phase) * 0.5 + 0.5) * H * 0.82 + 4
          : (Math.sin(t * 0.7 + b.phase) * 0.5 + 0.5) * H * 0.07 + 2;
        b.h += (target - b.h) * 0.17;
        var x = i * bw, rh = Math.max(b.h, 2), ry = H - rh;
        var g = ctx.createLinearGradient(x, ry, x, H);
        if (active) {
          g.addColorStop(0,   'rgba(74,108,247,0.95)');
          g.addColorStop(0.5, 'rgba(120,190,255,0.75)');
          g.addColorStop(1,   'rgba(74,108,247,0.35)');
        } else {
          g.addColorStop(0, 'rgba(74,108,247,0.22)');
          g.addColorStop(1, 'rgba(74,108,247,0.06)');
        }
        ctx.fillStyle = g;
        ctx.beginPath();
        if (ctx.roundRect) ctx.roundRect(x + 1, ry, bw - 2, rh, 2);
        else ctx.rect(x + 1, ry, bw - 2, rh);
        ctx.fill();
      }
    }
    drawWave(0);

    // â”€â”€ Initial state â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    setUI('idle');
    if (!fullText) aiStatus.textContent = 'No text provided';
    else buildDisplay(fullText);
  </script>
</body>
</html>
