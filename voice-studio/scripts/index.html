<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Studio Skill</title>
</head>
<body>
  <script>
    window['ai_edge_gallery_get_result'] = async (data) => {
      try {
        const jsonData = JSON.parse(data);
        const text  = jsonData.text  || '';
        const voice = jsonData.voice || '';
        const rate  = jsonData.rate  || 1.0;
        const pitch = jsonData.pitch || 1.0;

        if (!text.trim()) {
          return JSON.stringify({ error: 'No text provided to speak.' });
        }

        return JSON.stringify({
          result: 'Speaking response aloud via Agent Voice. Word-by-word highlighting active.',
          webview: {
            url: `studio.html?text=${encodeURIComponent(text)}&voice=${encodeURIComponent(voice)}&rate=${encodeURIComponent(rate)}&pitch=${encodeURIComponent(pitch)}`,
            aspectRatio: 1.15
          }
        });
      } catch (e) {
        console.error(e);
        return JSON.stringify({ error: `Voice Studio error: ${e.message}` });
      }
    };
  </script>
</body>
</html>
